<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>chessai</title>

<!-- type: Fraunces (display) + Spline Sans (body) + Spline Sans Mono (data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..600&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- styling: theme.css holds the swappable design tokens; board.css the structure -->
<link rel="stylesheet" href="/web/theme.css">
<link rel="stylesheet" href="/web/board.css">
</head>
<body>
  <!-- layout:
         topbar (full width)  — brand · game identity · status · skins
         board   |  rail       — board left; seat + trays + move log on the right
         controls (under board)— New board · Games · Flip · Resign, horizontal -->
  <div class="app">

    <!-- TOP — brand + live status stacked on the left; identity & skins on the right -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand"><h1>chessai</h1></div>
        <div id="status" class="status connecting">
          <span class="orb"></span>
          <span class="txt" id="statusText">connecting…</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="gamechip"><span class="dot"></span><span id="gameName">…</span></div>
        <div class="skins" id="skins">
          <button class="skin" data-theme="midnight" title="Midnight"></button>
          <button class="skin" data-theme="marble" title="Marble"></button>
          <button class="skin" data-theme="emerald" title="Emerald"></button>
        </div>
      </div>
    </header>

    <!-- the board -->
    <main class="board-pane">
      <div class="stage"><div class="frame"><div id="board"></div></div></div>
    </main>

    <!-- RIGHT rail — seats, captured trays, the move log (which grows to fill) -->
    <aside class="rail">
      <div class="seat">you · white &nbsp;—&nbsp; <span id="opponent">Chessai</span> · black</div>
      <div class="trays">
        <div class="tray"><span class="who">Chessai</span><span class="caps" id="capByYou"></span><span class="adv" id="advYou"></span></div>
        <div class="tray"><span class="who">you</span><span class="caps" id="capByAi"></span><span class="adv" id="advAi"></span></div>
      </div>
      <div class="log" id="log"><div class="empty-state">The first move is yours. Click a piece to begin.</div></div>
    </aside>

    <!-- controls — a horizontal strip directly below the board -->
    <div class="controls">
      <button id="btnNew">New board</button>
      <button id="btnGames" class="ghost">Games</button>
      <button id="btnFlip" class="ghost">Flip</button>
      <button id="btnResign" class="ghost">Resign</button>
    </div>

  </div>

  <!-- promotion modal: option buttons filled in by view.js -->
  <div class="veil" id="veil"><div class="promo">
    <h3>Promote</h3><p>Choose a piece for your pawn</p>
    <div class="opts" id="promoOpts"></div>
  </div></div>

  <!-- games picker: rows filled in by view.js -->
  <div class="veil" id="gamesVeil"><div class="sheet">
    <h3>Your games</h3><p>Pick a board to view, or open a new one in its own window.</p>
    <div class="games" id="gamesList"></div>
  </div></div>

  <!-- app.js is the entry point; it pulls in engine.js, api.js and view.js -->
  <script type="module" src="/web/app.js"></script>
</body>
</html>
